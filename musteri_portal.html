<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteri Portali - Vade Takip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .portal-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .portal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .portal-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .portal-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .login-section, .dashboard-section {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 13px;
            color: #666;
        }
        
        .payment-list {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
        }
        
        .payment-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .payment-amount {
            font-size: 20px;
            font-weight: 700;
            color: #dc3545;
        }
        
        .payment-date {
            font-size: 13px;
            color: #666;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-warning {
            background: #ffc107;
            color: white;
        }
        
        .badge-danger {
            background: #dc3545;
            color: white;
        }
        
        .badge-success {
            background: #28a745;
            color: white;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .hidden {
            display: none;
        }
        
        .contact-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .contact-info h4 {
            margin-bottom: 10px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <div class="portal-header">
            <h1>👤 Müşteri Portali</h1>
            <p>Ödeme durumunuzu görüntüleyin</p>
        </div>
        
        <!-- Login Section -->
        <div id="loginSection" class="login-section">
            <div class="form-group">
                <label>Telefon Numaranız</label>
                <input type="tel" id="customerPhone" placeholder="0532 123 45 67">
            </div>
            <button class="btn" onclick="customerLogin()">🔐 Giriş Yap</button>
        </div>
        
        <!-- Dashboard Section -->
        <div id="dashboardSection" class="dashboard-section hidden">
            <h2 style="margin-bottom: 20px;">Hoşgeldiniz, <span id="customerName"></span></h2>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalDebt">0₺</div>
                    <div class="stat-label">Toplam Borç</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingPayments">0</div>
                    <div class="stat-label">Bekleyen Ödeme</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="overduePayments">0</div>
                    <div class="stat-label">Gecikmiş Ödeme</div>
                </div>
            </div>
            
            <div class="payment-list">
                <h3 style="margin-bottom: 15px;">💰 Bekleyen Ödemeleriniz</h3>
                <div id="paymentsList"></div>
            </div>
            
            <div class="contact-info">
                <h4>📞 Bize Ulaşın</h4>
                <p id="companyContact">Atlaspet Pet Products<br>İletişim: info@atlaspet.com</p>
            </div>
            
            <button class="logout-btn" onclick="customerLogout()">🚪 Çıkış Yap</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase Config - ANA SİSTEMLE AYNI
        const firebaseConfig = {
            apiKey: "AIzaSyBPUGGuDhypAHKobgR_LO70RYR2cFo3zio",
            authDomain: "vade-takip-ffb30.firebaseapp.com",
            projectId: "vade-takip-ffb30",
            storageBucket: "vade-takip-ffb30.firebasestorage.app",
            messagingSenderId: "275696615861",
            appId: "1:275696615861:web:1440fb8e5451724e5e19fc",
            measurementId: "G-7KWHGMLDMX"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let currentCustomer = null;
        
        // ⚠️ ÖNEMLİ: Bu değeri kendi firma ID'niz ile değiştirin!
        // Settings -> Firma Yönetimi -> Firma seç -> Console'da currentCompanyId'yi görebilirsiniz
        const COMPANY_ID = 'YOUR_COMPANY_ID_HERE'; // Buraya gerçek firma ID'si gelecek
        
        async function customerLogin() {
            const phone = document.getElementById('customerPhone').value.trim().replace(/\D/g, '');
            
            if (!phone || phone.length < 10) {
                alert('❌ Lütfen geçerli bir telefon numarası girin!');
                return;
            }
            
            try {
                // Müşteri ödemelerini ara
                const snapshot = await db.collection('companies')
                    .doc(COMPANY_ID)
                    .collection('customers')
                    .where('phone', '==', phone)
                    .limit(1)
                    .get();
                
                if (snapshot.empty) {
                    alert('❌ Bu telefon numarasına kayıtlı ödeme bulunamadı!');
                    return;
                }
                
                const customerData = snapshot.docs[0].data();
                currentCustomer = {
                    phone: phone,
                    name: customerData.name
                };
                
                // Dashboard'a geç
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('customerName').textContent = customerData.name;
                
                await loadCustomerPayments();
                
            } catch (error) {
                console.error('Login error:', error);
                alert('❌ Giriş yapılamadı: ' + error.message);
            }
        }
        
        async function loadCustomerPayments() {
            try {
                const snapshot = await db.collection('companies')
                    .doc(COMPANY_ID)
                    .collection('customers')
                    .where('phone', '==', currentCustomer.phone)
                    .where('status', '==', 'pending')
                    .get();
                
                const payments = [];
                snapshot.forEach(doc => {
                    payments.push({ id: doc.id, ...doc.data() });
                });
                
                const today = new Date();
                const totalDebt = payments.reduce((sum, p) => sum + (p.amount || 0), 0);
                const overdueCount = payments.filter(p => new Date(p.dueDate) < today).length;
                
                document.getElementById('totalDebt').textContent = totalDebt.toLocaleString('tr-TR') + '₺';
                document.getElementById('pendingPayments').textContent = payments.length;
                document.getElementById('overduePayments').textContent = overdueCount;
                
                // Ödemeleri listele
                const paymentsList = document.getElementById('paymentsList');
                
                if (payments.length === 0) {
                    paymentsList.innerHTML = '<p style="text-align: center; color: #666;">Bekleyen ödemeniz yok! 🎉</p>';
                    return;
                }
                
                paymentsList.innerHTML = payments.map(p => {
                    const dueDate = new Date(p.dueDate);
                    const diffDays = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
                    
                    let badge = '';
                    if (diffDays < 0) {
                        badge = `<span class="badge badge-danger">⚠️ ${Math.abs(diffDays)} gün gecikmiş</span>`;
                    } else if (diffDays <= 3) {
                        badge = `<span class="badge badge-warning">📅 ${diffDays} gün kaldı</span>`;
                    } else {
                        badge = `<span class="badge badge-success">✓ ${diffDays} gün kaldı</span>`;
                    }
                    
                    return `
                        <div class="payment-item">
                            <div>
                                <div class="payment-amount">${p.amount.toLocaleString('tr-TR')}₺</div>
                                <div class="payment-date">Vade: ${dueDate.toLocaleDateString('tr-TR')}</div>
                                ${p.docNo ? `<div style="font-size: 12px; color: #999;">Evrak: ${p.docNo}</div>` : ''}
                            </div>
                            <div>
                                ${badge}
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Load payments error:', error);
            }
        }
        
        function customerLogout() {
            currentCustomer = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('customerPhone').value = '';
        }
    </script>
</body>
</html>
